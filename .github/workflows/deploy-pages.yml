# GitHub Pages — static deploy via Actions (shows under Environments → github-pages).
#
# One-time repo setup: Settings → Pages → Build and deployment → Source: GitHub Actions
# (not "Deploy from a branch"), or this workflow will not publish.
#
# After deploy, open the site with ?tx=https://your-host/fhir so the dashboard targets
# your FHIR base (see js/dashboard/routing.js). Ensure the FHIR server allows CORS
# from https://<owner>.github.io when using a project site.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
